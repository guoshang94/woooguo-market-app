<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>WOOOGUO 市集小幫手</title>
  <style>
    :root{--ink:#292420;--muted:#7d736b;--paper:#fffdf8;--cream:#f4ede3;--brand:#e85d3f;--brand2:#bb4029;--green:#32745b;--line:#e4d9cd;--shadow:0 10px 30px #6d4e3220}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;color:var(--ink);background:var(--cream)}
    button,input,select{font:inherit}.top{position:sticky;top:0;z-index:5;background:#292420;color:white;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand-title{display:flex;align-items:center;gap:10px;min-width:0}.brand-title img{width:52px;height:52px;object-fit:contain;border-radius:12px}.title-text{min-width:0}.top h1{font-size:18px;margin:0;white-space:nowrap}.sync-status{display:block;margin-top:2px;font-size:11px;color:#ffffffaa}.sync-status.ok{color:#9ee6bd}.sync-status.busy{color:#ffe19a}.sync-status.error{color:#ffaaa1}.top-actions{display:flex;gap:8px}.top button{background:#ffffff18;border:1px solid #ffffff35;color:white}
    button{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;background:white;color:var(--ink)}button:active{transform:scale(.98)}button.primary{background:var(--brand);color:white}button.save-button{background:#32745b!important;color:white!important}.shell{max-width:1200px;margin:auto;padding:16px;display:grid;grid-template-columns:1fr 360px;gap:16px}.manage-shell{max-width:1200px;margin:auto;padding:16px}.manage-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.manage-products{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.manage-product{background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer}.manage-product img,.manage-product .product-placeholder{display:block;width:100%;aspect-ratio:1/1;object-fit:cover;object-position:center;background:var(--cream)}.manage-product-info{padding:12px}.manage-product-info strong{display:block;margin-bottom:5px}.manage-product-info small{color:var(--muted)}.hidden{display:none!important}
    .panel{background:var(--paper);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-head h2{font-size:17px;margin:0}.categories{display:flex;gap:8px;padding:14px;overflow:auto}.categories button{white-space:nowrap;border:1px solid var(--line)}.categories button.on{background:var(--ink);color:white}
    .products{padding:0 14px 18px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.product{min-height:210px;text-align:left;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;padding:0}.product-info{padding:10px;display:flex;flex-direction:column;gap:4px}.product-image{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--cream)}.product-placeholder{width:100%;aspect-ratio:1/1;display:grid;place-items:center;background:var(--cream);color:var(--muted);font-size:13px}.product.sold{opacity:.45}.product strong{font-size:16px}.price{color:var(--brand2);font-size:17px}.stock{font-size:12px;color:var(--muted)}
    .cart{position:sticky;top:76px;height:calc(100vh - 92px);display:flex;flex-direction:column}.cart-list{padding:10px 14px;overflow:auto;flex:1}.empty{padding:36px 10px;text-align:center;color:var(--muted)}.cart-row{padding:12px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:8px}.qty{display:flex;gap:7px;align-items:center}.qty button{padding:4px 9px;border:1px solid var(--line);border-radius:8px}.summary{border-top:1px solid var(--line);padding:14px}.sumrow{display:flex;justify-content:space-between;margin:6px 0}.total{font-size:21px;font-weight:800}.gift{color:var(--green);font-weight:700;font-size:13px}.checkout{width:100%;margin-top:9px;font-size:17px}
    dialog{border:0;border-radius:20px;padding:0;max-width:760px;width:calc(100% - 24px);max-height:90vh;box-shadow:0 30px 80px #0005}dialog::backdrop{background:#1d1712aa}.modal-head{position:sticky;top:0;background:white;padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;z-index:2}.modal-head h2{margin:0;font-size:19px}.modal-body{padding:16px;overflow:auto}.close{background:var(--cream)}.tabs{display:flex;gap:8px;margin-bottom:16px}.tabs button{background:var(--cream)}.tabs .on{background:var(--ink);color:white}.setting-list{display:grid;gap:10px}.setting-card{border:1px solid var(--line);border-radius:14px;padding:12px;display:grid;grid-template-columns:minmax(0,1fr);gap:10px}.setting-card small{color:var(--muted)}.actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.actions button{background:var(--cream);padding:9px 11px}.danger{color:#b52b20}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;padding:14px;background:var(--cream);border-radius:14px}.form label{font-size:12px;color:var(--muted)}.form input,.form select{width:100%;margin-top:4px;border:1px solid var(--line);border-radius:9px;padding:9px;background:white}.form .wide{grid-column:1/-1}.form .checkbox-label{display:flex;align-items:center;gap:7px;width:max-content}.form .checkbox-label input{width:auto;margin:0;padding:0}.form button{justify-self:start}.form .save-button{background:#32745b!important;color:white!important}
    .thumb{width:55px;height:55px;object-fit:cover;border-radius:10px;background:var(--cream);float:left;margin-right:10px}.file-button{position:relative;overflow:hidden}.file-button input{position:absolute;inset:0;opacity:0;cursor:pointer}.revenue-box{background:var(--ink);color:white;border-radius:16px;padding:17px;margin-bottom:14px}.revenue-box small{color:#ffffffaa}.revenue-number{font-size:30px;font-weight:800;margin:4px 0}.periods{display:flex;gap:7px;overflow:auto;margin-bottom:14px}.periods button{white-space:nowrap;background:var(--cream);border:1px solid var(--line)}.periods button.on{background:var(--brand);color:white;border-color:var(--brand)}.order-card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}.order-title{display:flex;justify-content:space-between;gap:12px;margin-bottom:6px}.order-items{font-size:13px;color:var(--muted);line-height:1.7}.order-total{color:var(--brand2);font-size:17px}.order-gift{color:var(--green)}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:white;border-radius:12px;padding:12px 18px;z-index:20;display:none}.toast.checkout-toast{top:50%;bottom:auto;transform:translate(-50%,-50%);min-width:min(420px,calc(100% - 32px));padding:30px 24px;border-radius:22px;text-align:center;font-size:24px;font-weight:800;box-shadow:0 24px 80px #0006;border:3px solid #ffffff55}
    @media(max-width:800px){.shell{grid-template-columns:1fr;padding:10px}.cart{position:static;height:auto;min-height:380px}.products,.manage-products{grid-template-columns:repeat(2,minmax(0,1fr))}.top{padding-top:max(8px,env(safe-area-inset-top));flex-wrap:wrap}.brand-title{width:100%}.brand-title img{width:44px;height:44px}.top h1{font-size:16px}.top-actions{width:100%;display:grid;grid-template-columns:1fr 1fr}.top-actions button{width:100%;padding:10px 8px}.top-actions #salesButton{grid-column:1/-1}}@media(max-width:420px){.products,.manage-products{grid-template-columns:1fr 1fr}.product{min-height:190px}.form{grid-template-columns:1fr}.form .wide{grid-column:auto}}
  </style>
</head>
<body>
  <header class="top"><div class="brand-title"><img src="woooguo-mascot.png" alt=""><div class="title-text"><h1 id="pageTitle">WOOOGUO 市集小幫手</h1><span class="sync-status busy" id="syncStatus">正在連接線上資料庫</span></div></div><div class="top-actions"><button id="historyButton" onclick="openHistory()">歷史訂單</button><button id="manageButton" onclick="openManagement()">管理商品與優惠</button><button class="hidden" id="salesButton" onclick="openSales()">返回結帳</button></div></header>
  <main class="shell" id="salesPage">
    <section class="panel"><div class="panel-head"><h2>選擇商品</h2><span class="stock" id="productCount"></span></div><div class="categories" id="categories"></div><div class="products" id="products"></div></section>
    <aside class="panel cart"><div class="panel-head"><h2>本次購買</h2><button onclick="clearCart()">清空</button></div><div class="cart-list" id="cart"></div><div class="summary" id="summary"></div></aside>
  </main>
  <main class="manage-shell hidden" id="managementPage"><div class="manage-tools"><div class="tabs"><button id="tabProducts" onclick="showTab('products')">商品與庫存</button><button id="tabRules" onclick="showTab('rules')">折扣與贈品</button></div><button class="primary" id="newProductButton" onclick="openProductEditor()">＋ 新增商品</button></div><div class="categories" id="manageCategories"></div><div id="settingsContent"></div></main>
  <dialog id="productEditor"><div class="modal-head"><h2 id="editorTitle">編輯商品</h2><button class="close" onclick="$('productEditor').close()">取消</button></div><div class="modal-body"><form class="form" id="productForm" onsubmit="saveProductEditor(event)"><input type="hidden" name="id"><label>類別<input required name="category"></label><label>商品名稱<input required name="name"></label><label>價格<input required min="0" type="number" name="price"></label><label>目前庫存<input required min="0" type="number" name="stock"></label><label class="wide">更換圖片<input accept="image/*" type="file" name="image"></label><label class="wide checkbox-label">這是贈品（不顯示在結帳首頁）<input type="checkbox" name="gift"></label><div class="wide actions"><button class="save-button">儲存修改</button><button type="button" class="danger" id="editorDelete" onclick="deleteEditingProduct()">刪除商品</button></div></form></div></dialog>
  <dialog id="history"><div class="modal-head"><h2>歷史訂單</h2><button class="close" onclick="$('history').close()">完成</button></div><div class="modal-body" id="historyContent"></div></dialog>
  <div class="toast" id="toast"></div>
<script>
const initial={products:[{id:1,category:'衣服',name:'白色短袖',price:590,stock:20,gift:false},{id:2,category:'配件',name:'帆布袋',price:350,stock:15,gift:false},{id:3,category:'貼紙',name:'水果貼紙包',price:100,stock:30,gift:false}],rules:[{id:1,name:'滿 1000 元打 9 折',threshold:1000,percent:10,giftId:null,giftQty:0}],cart:{},orders:[]};
let data=JSON.parse(localStorage.getItem('woooguo-market-data')||'null')||initial, active='全部', manageActive='全部', tab='products', revenuePeriod='today', editingProductId=null;
data.orders=data.orders||[];
const SUPABASE_URL='https://xfwrluahcbamqrijeinu.supabase.co';
const SUPABASE_KEY='sb_publishable_aETaxz_WBRwHL2iJMqpXcg_0jvjTGFM';
const $=id=>document.getElementById(id); const money=n=>'$'+Math.round(n).toLocaleString('zh-TW');
let syncTimer=null,syncing=false,lastRemoteUpdate='';
function normalizeData(){data.products=data.products||initial.products;data.rules=data.rules||initial.rules;data.cart=data.cart||{};data.orders=data.orders||[]}
function dataScore(d){return (d?.products||[]).length+(d?.orders||[]).length*3+(d?.products||[]).filter(p=>p.image).length*5+(d?.rules||[]).length}
function syncStatus(text,type){$('syncStatus').textContent=text;$('syncStatus').className='sync-status '+type}
function save(){normalizeData();localStorage.setItem('woooguo-market-data',JSON.stringify(data));syncStatus('等待同步','busy');clearTimeout(syncTimer);syncTimer=setTimeout(pushRemote,450)}
function syncError(e){const detail=e?.message==='Failed to fetch'?'無法連線到資料庫':(e?.message||'未知錯誤').slice(0,80);syncStatus(`離線：${detail}`,'error');console.error('同步失敗',e)}
async function pushRemote(){if(syncing)return;syncing=true;syncTimer=null;syncStatus('同步中','busy');try{const r=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.woooguo-market`,{method:'PATCH',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify({data,updated_at:new Date().toISOString()})});if(!r.ok)throw new Error(`寫入失敗 ${r.status}：${await r.text()}`);const rows=await r.json();lastRemoteUpdate=rows[0]?.updated_at||'';syncStatus('已同步','ok')}catch(e){syncError(e)}finally{syncing=false}}
async function pullRemote(first=false){if(syncing||syncTimer||document.querySelector('dialog[open]'))return;try{const r=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.woooguo-market&select=data,updated_at`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});if(!r.ok)throw new Error(`讀取失敗 ${r.status}：${await r.text()}`);const row=(await r.json())[0];if(row?.data?.products?.length){if(first&&dataScore(data)>dataScore(row.data)){syncStatus('正在上傳此裝置原有資料','busy');await pushRemote();return}if(row.updated_at!==lastRemoteUpdate){data=row.data;normalizeData();lastRemoteUpdate=row.updated_at;localStorage.setItem('woooguo-market-data',JSON.stringify(data));render();if(!$('managementPage').classList.contains('hidden'))showTab(tab)}syncStatus('已同步','ok')}else if(first){await pushRemote()}}catch(e){syncError(e)}}
async function initializeSync(){normalizeData();render();if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));if('caches'in window)caches.delete('woooguo-market-v1');await pullRemote(true);setInterval(()=>pullRemote(false),4000)}
function toast(s){$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',1800)}
function checkoutToast(s){$('toast').classList.add('checkout-toast');$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>{$('toast').style.display='none';$('toast').classList.remove('checkout-toast')},2600)}
function categories(){return ['全部',...new Set(data.products.filter(p=>!p.gift).map(p=>p.category))]}
function render(){
 const cats=categories();if(!cats.includes(active))active='全部';
 $('categories').innerHTML=cats.map(c=>`<button class="${c===active?'on':''}" onclick="active='${esc(c)}';render()">${c}</button>`).join('');
 const ps=data.products.filter(p=>!p.gift&&(active==='全部'||p.category===active));
 $('productCount').textContent=`共 ${data.products.filter(p=>!p.gift).length} 項商品`;
 $('products').innerHTML=ps.map(p=>`<button class="product ${p.stock<1?'sold':''}" onclick="add(${p.id})" ${p.stock<1?'disabled':''}>${p.image?`<img class="product-image" src="${p.image}" alt="">`:'<div class="product-placeholder">尚未加入圖片</div>'}<span class="product-info"><strong>${html(p.name)}</strong><span class="price">${money(p.price)}</span><span class="stock">庫存 ${p.stock}</span></span></button>`).join('');
 renderCart();
}
function cartItems(){return Object.entries(data.cart).map(([id,q])=>({p:data.products.find(x=>x.id==id),q})).filter(x=>x.p)}
function calc(){const subtotal=cartItems().reduce((s,x)=>s+x.p.price*x.q,0);const applicable=data.rules.filter(r=>subtotal>=r.threshold);const discount=applicable.reduce((m,r)=>Math.max(m,subtotal*r.percent/100),0);const gifts=applicable.filter(r=>r.giftId&&r.giftQty).map(r=>({r,p:data.products.find(p=>p.id===r.giftId)})).filter(x=>x.p);return{subtotal,discount,total:subtotal-discount,gifts}}
function renderCart(){const items=cartItems();$('cart').innerHTML=items.length?items.map(x=>`<div class="cart-row"><div><strong>${html(x.p.name)}</strong><div class="stock">${money(x.p.price)} × ${x.q}</div></div><div class="qty"><button onclick="change(${x.p.id},-1)">−</button><b>${x.q}</b><button onclick="change(${x.p.id},1)">＋</button></div></div>`).join(''):'<div class="empty">點選左邊的商品<br>開始建立訂單</div>';const c=calc();$('summary').innerHTML=`<div class="sumrow"><span>商品小計</span><b>${money(c.subtotal)}</b></div><div class="sumrow"><span>折扣</span><b>− ${money(c.discount)}</b></div>${c.gifts.map(x=>`<div class="gift">贈送：${html(x.p.name)} × ${x.r.giftQty}${x.p.stock<x.r.giftQty?'（庫存不足）':''}</div>`).join('')}<div class="sumrow total"><span>總計</span><span>${money(c.total)}</span></div><button class="primary checkout" onclick="checkout()" ${items.length?'':'disabled'}>完成結帳並扣庫存</button>`}
function add(id){const p=data.products.find(x=>x.id===id),q=data.cart[id]||0;if(q>=p.stock)return toast('庫存不足');data.cart[id]=q+1;save();renderCart()}
function change(id,n){const p=data.products.find(x=>x.id===id),q=(data.cart[id]||0)+n;if(q>p.stock)return toast('庫存不足');if(q<=0)delete data.cart[id];else data.cart[id]=q;save();renderCart()}
function clearCart(){data.cart={};save();renderCart()}
function checkout(){const c=calc(),items=cartItems();if(c.gifts.some(x=>x.p.stock<x.r.giftQty))return toast('贈品庫存不足，無法結帳');data.orders.unshift({id:Date.now(),time:new Date().toLocaleString('zh-TW',{hour12:false}),items:items.map(x=>({productId:x.p.id,name:x.p.name,price:x.p.price,qty:x.q})),gifts:c.gifts.map(x=>({productId:x.p.id,name:x.p.name,qty:x.r.giftQty})),subtotal:c.subtotal,discount:c.discount,total:c.total});items.forEach(x=>x.p.stock-=x.q);c.gifts.forEach(x=>x.p.stock-=x.r.giftQty);data.cart={};save();render();checkoutToast(`結帳完成！共 ${money(c.total)}`)}
function openHistory(){renderHistory();$('history').showModal()}
function setRevenuePeriod(p){revenuePeriod=p;renderHistory()}
function periodStart(p){const n=new Date();if(p==='all')return 0;if(p==='today')return new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();if(p==='week'){const d=(n.getDay()+6)%7;return new Date(n.getFullYear(),n.getMonth(),n.getDate()-d).getTime()}return new Date(n.getFullYear(),n.getMonth(),1).getTime()}
function renderHistory(){const labels={today:'今天',week:'本週',month:'本月',all:'全部'},orders=data.orders.filter(o=>o.id>=periodStart(revenuePeriod)),revenue=orders.reduce((s,o)=>s+o.total,0);$('historyContent').innerHTML=`<div class="revenue-box"><small>${labels[revenuePeriod]}營業額</small><div class="revenue-number">${money(revenue)}</div><small>共 ${orders.length} 筆訂單</small></div><div class="periods">${Object.entries(labels).map(([p,n])=>`<button class="${p===revenuePeriod?'on':''}" onclick="setRevenuePeriod('${p}')">${n}</button>`).join('')}</div>${orders.length?orders.map(o=>`<div class="order-card"><div class="order-title"><div><strong>訂單 #${String(data.orders.length-data.orders.indexOf(o)).padStart(3,'0')}</strong><br><small>${html(o.time)}</small></div><strong class="order-total">${money(o.total)}</strong></div><div class="order-items">${o.items.map(x=>`${html(x.name)}　${money(x.price)} × ${x.qty}`).join('<br>')}</div>${o.gifts.length?`<div class="order-items order-gift">贈品：${o.gifts.map(x=>`${html(x.name)} × ${x.qty}`).join('、')}</div>`:''}<div class="order-items">小計 ${money(o.subtotal)}・折扣 −${money(o.discount)}</div><div class="actions"><button class="danger" onclick="deleteOrder(${o.id})">刪除訂單</button></div></div>`).join(''):'<div class="empty">這個期間目前沒有訂單</div>'}`}
function deleteOrder(id){if(!confirm('確定刪除這筆訂單？商品與贈品庫存會一起恢復。'))return;const order=data.orders.find(o=>o.id===id);if(!order)return;[...order.items,...order.gifts].forEach(x=>{const p=data.products.find(p=>x.productId?p.id===x.productId:p.name===x.name);if(p)p.stock+=x.qty});data.orders=data.orders.filter(o=>o.id!==id);save();render();renderHistory();toast('訂單已刪除，庫存已恢復')}
function openManagement(){$('salesPage').classList.add('hidden');$('managementPage').classList.remove('hidden');$('historyButton').classList.add('hidden');$('manageButton').classList.add('hidden');$('salesButton').classList.remove('hidden');$('pageTitle').textContent='管理商品與優惠';showTab(tab);window.scrollTo(0,0)}
function openSales(){$('managementPage').classList.add('hidden');$('salesPage').classList.remove('hidden');$('historyButton').classList.remove('hidden');$('manageButton').classList.remove('hidden');$('salesButton').classList.add('hidden');$('pageTitle').textContent='WOOOGUO 市集小幫手';render();window.scrollTo(0,0)}
function showTab(t){tab=t;$('tabProducts').className=t==='products'?'on':'';$('tabRules').className=t==='rules'?'on':'';$('newProductButton').classList.toggle('hidden',t!=='products');$('manageCategories').classList.toggle('hidden',t!=='products');t==='products'?renderProductSettings():renderRules()}
function renderProductSettings(){const cats=['全部',...new Set(data.products.map(p=>p.gift?'贈品':p.category))];if(!cats.includes(manageActive))manageActive='全部';$('manageCategories').innerHTML=cats.map(c=>`<button class="${c===manageActive?'on':''}" onclick="manageActive='${esc(c)}';renderProductSettings()">${html(c)}</button>`).join('');const ps=data.products.filter(p=>manageActive==='全部'||(manageActive==='贈品'?p.gift:!p.gift&&p.category===manageActive));$('settingsContent').innerHTML=`<div class="manage-products">${ps.map(p=>`<article class="manage-product" onclick="openProductEditor(${p.id})">${p.image?`<img src="${p.image}" alt="">`:'<div class="product-placeholder">尚未加入圖片</div>'}<div class="manage-product-info"><strong>${html(p.name)}</strong><small>${html(p.category)}・${money(p.price)}<br>庫存 ${p.stock}${p.gift?'・贈品':''}</small></div></article>`).join('')}</div>`}
function openProductEditor(id){editingProductId=id||null;const p=id?data.products.find(x=>x.id===id):{category:'',name:'',price:0,stock:0,gift:false};const f=$('productForm');f.reset();f.elements.id.value=p.id||'';f.elements.category.value=p.category;f.elements.name.value=p.name;f.elements.price.value=p.price;f.elements.stock.value=p.stock;f.elements.gift.checked=!!p.gift;$('editorTitle').textContent=id?'編輯商品':'新增商品';$('editorDelete').classList.toggle('hidden',!id);$('productEditor').showModal()}
async function saveProductEditor(e){e.preventDefault();const f=new FormData(e.target),file=f.get('image'),existing=editingProductId?data.products.find(x=>x.id===editingProductId):null,image=file&&file.size?await resizeImage(file):(existing?.image||'');const product={id:existing?.id||Date.now(),category:f.get('category'),name:f.get('name'),price:+f.get('price'),stock:+f.get('stock'),gift:f.get('gift')==='on',image};if(existing)Object.assign(existing,product);else data.products.push(product);save();render();renderProductSettings();$('productEditor').close();toast(existing?'商品已更新':'商品已新增')}
async function uploadProductImage(e,id){const file=e.target.files[0];if(!file)return;const p=data.products.find(x=>x.id===id);p.image=await resizeImage(file);save();render();renderProductSettings();toast('圖片已更新')}
function removeProductImage(id){data.products.find(x=>x.id===id).image='';save();render();renderProductSettings();toast('圖片已移除')}
function resizeImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const size=600,side=Math.min(img.width,img.height),sx=(img.width-side)/2,sy=(img.height-side)/2,canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;canvas.getContext('2d').drawImage(img,sx,sy,side,side,0,0,size,size);resolve(canvas.toDataURL('image/jpeg',.82))};img.src=reader.result};reader.readAsDataURL(file)})}
function deleteEditingProduct(){if(!editingProductId||!confirm('確定刪除這個商品？'))return;data.products=data.products.filter(p=>p.id!==editingProductId);delete data.cart[editingProductId];data.rules.forEach(r=>{if(r.giftId===editingProductId)r.giftId=null});save();render();renderProductSettings();$('productEditor').close();toast('商品已刪除')}
function renderRules(){$('settingsContent').innerHTML=`<form class="form" onsubmit="addRule(event)"><label class="wide">優惠名稱<input required name="name" placeholder="例如：滿 1000 元打 9 折"></label><label>消費滿多少元<input required min="0" type="number" name="threshold"></label><label>折扣百分比<input required min="0" max="100" type="number" name="percent" value="0"></label><label>贈送商品<select name="giftId"><option value="">不贈送</option>${data.products.filter(p=>p.gift).map(p=>`<option value="${p.id}">${html(p.name)}（庫存 ${p.stock}）</option>`).join('')}</select></label><label>贈送數量<input min="0" type="number" name="giftQty" value="0"></label><button class="primary">新增優惠</button></form><div class="setting-list">${data.rules.map(r=>`<div class="setting-card"><div><strong>${html(r.name)}</strong><br><small>滿 ${money(r.threshold)}・折扣 ${r.percent}%${r.giftId?'・贈送 '+html(data.products.find(p=>p.id===r.giftId)?.name||'已刪除')+' × '+r.giftQty:''}</small></div><div class="actions"><button class="danger" onclick="deleteRule(${r.id})">刪除</button></div></div>`).join('')}</div>`}
function addRule(e){e.preventDefault();const f=new FormData(e.target);data.rules.push({id:Date.now(),name:f.get('name'),threshold:+f.get('threshold'),percent:+f.get('percent'),giftId:+f.get('giftId')||null,giftQty:+f.get('giftQty')||0});save();renderCart();renderRules();toast('已新增優惠')}
function deleteRule(id){if(!confirm('確定刪除這個優惠？'))return;data.rules=data.rules.filter(r=>r.id!==id);save();renderCart();renderRules()}
function html(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
initializeSync();
</script>
</body>
</html>
